version: 2.1

orbs:
  node: circleci/node@5.0.2
  okareo-orb: okareo/okareo-orb@0.0.1

jobs:
  text-simulation:
    docker:
      - image: cimg/python:3.12.3
    working_directory: ~/cookbook/tutorials/text-simulation
    steps:
      - checkout:
          path: ~/cookbook
      - okareo-orb/setup
      - okareo-orb/validate

workflows:
  version: 2
  build:
    jobs:
      - text-simulation:
          context:
            - Demo-Env
